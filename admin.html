<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ekosistem Pertanian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-green-900 text-white p-6 shadow-2xl mb-8 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter flex items-center">
                    <i class="fas fa-user-shield mr-3 text-green-400"></i>
                    PANEL KONTROL ADMIN
                </h1>
                <p class="text-[10px] text-green-300 uppercase tracking-widest font-bold">Manajemen Verifikasi Mitra & Database</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchData()" class="bg-green-700 hover:bg-green-600 px-5 py-2 rounded-xl transition-all shadow-lg flex items-center gap-2 group">
                    <i class="fas fa-sync-alt group-hover:rotate-180 transition-transform duration-500"></i> 
                    <span class="font-bold text-sm">Refresh Data</span>
                </button>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-xl transition-all shadow-lg font-bold text-sm">
                    KELUAR
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        <div id="loader" class="flex flex-col items-center justify-center py-32">
            <div class="relative">
                <div class="w-16 h-16 border-4 border-green-200 border-t-green-700 rounded-full animate-spin"></div>
            </div>
            <p class="mt-6 text-gray-500 font-semibold animate-pulse">Mengambil data dari Google Sheets...</p>
        </div>

        <div id="content" class="hidden">
            <div id="stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10"></div>

            <div id="tables-container" class="space-y-16"></div>
        </div>
    </div>

    <script>
        // GANTI URL INI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxz6sMuS8un2-CltlwVNGek0INO3tfYONVruEw5G1ApaAZT9I0wCp3RqTBagryVxTAJ/exec';

        // 1. FUNGSI AMBIL DATA
        async function fetchData() {
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            
            loader.classList.remove('hidden');
            content.classList.add('hidden');

            try {
                const response = await fetch(`${scriptURL}?action=read`);
                const data = await response.json();

                const groups = {
                    'petani': [],
                    'pabrik': [],
                    'distro': [],
                    'konsumen': []
                };

                data.forEach(user => {
                    if (groups[user.peran]) groups[user.peran].push(user);
                });

                renderStats(groups);
                renderTables(groups);

                loader.classList.add('hidden');
                content.classList.remove('hidden');

            } catch (error) {
                console.error("Fetch Error:", error);
                alert("Koneksi gagal. Pastikan Web App sudah di-deploy dengan benar.");
            }
        }

        // 2. FUNGSI VERIFIKASI (MENGAKTIFKAN)
        async function verifikasiUser(username, btnElement) {
            if (!confirm(`Aktifkan verifikasi untuk: ${username}?`)) return;

            btnElement.disabled = true;
            btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(`${scriptURL}?action=verify&username=${username}&status=VERIFIED`);
                const result = await response.json();

                if (result.result === "success") {
                    fetchData(); 
                } else {
                    alert("Gagal memperbarui status.");
                    fetchData();
                }
            } catch (error) {
                alert("Error koneksi server.");
                fetchData();
            }
        }

        // 3. FUNGSI CABUT AKSES (MENGEMBALIKAN KE PENDING)
        async function suspendUser(username, btnElement) {
            if (!confirm(`PERINGATAN: Cabut akses verifikasi untuk ${username}? Mitra ini tidak akan bisa mengakses dashboard.`)) return;

            btnElement.disabled = true;
            btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(`${scriptURL}?action=verify&username=${username}&status=PENDING`);
                const result = await response.json();

                if (result.result === "success") {
                    fetchData(); 
                } else {
                    alert("Gagal mencabut akses.");
                    fetchData();
                }
            } catch (error) {
                alert("Error koneksi server.");
                fetchData();
            }
        }

        // 4. RENDER STATISTIK
        function renderStats(groups) {
            const statsDiv = document.getElementById('stats');
            const icons = { petani: 'fa-tractor', pabrik: 'fa-industry', distro: 'fa-truck', konsumen: 'fa-shopping-basket' };
            
            statsDiv.innerHTML = Object.keys(groups).map(key => `
                <div class="glass-card p-6 rounded-3xl shadow-sm border-l-8 border-green-800 transition hover:shadow-md text-left">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-gray-400 text-[10px] uppercase font-black tracking-widest mb-1">${key}</p>
                            <h4 class="text-4xl font-black text-gray-800">${groups[key].length}</h4>
                        </div>
                        <div class="text-green-900/10 text-4xl"><i class="fas ${icons[key]}"></i></div>
                    </div>
                </div>
            `).join('');
        }

        // 5. RENDER TABEL DINAMIS (DENGAN WARNA TEKS DINAMIS)
        function renderTables(groups) {
            const container = document.getElementById('tables-container');
            container.innerHTML = '';

            Object.keys(groups).forEach(peran => {
                if (groups[peran].length === 0) return;

                container.innerHTML += `
                    <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-gray-100">
                        <div class="bg-gray-50 px-8 py-5 border-b flex justify-between items-center">
                            <h2 class="text-lg font-black text-gray-700 uppercase tracking-tight flex items-center">
                                <span class="w-3 h-3 bg-green-600 rounded-full mr-3 animate-pulse"></span>
                                Daftar Mitra ${peran}
                            </h2>
                            <span class="text-xs font-bold text-gray-400 bg-white px-3 py-1 rounded-full border">${groups[peran].length} Data</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-white text-gray-400 text-[11px] uppercase font-black tracking-widest border-b">
                                    <tr>
                                        <th class="px-8 py-4">Identitas Mitra</th>
                                        <th class="px-8 py-4">Wilayah</th>
                                        <th class="px-8 py-4">Status</th>
                                        <th class="px-8 py-4 text-center">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50 text-sm">
                                    ${groups[peran].map(m => {
                                        // Logika warna teks dan label status
                                        const isVerified = m.status === 'VERIFIED';
                                        const textColor = isVerified ? 'text-blue-600' : 'text-red-600';
                                        const labelText = isVerified ? 'TERVERIFIKASI / AKTIF' : 'PENDING / TERTUNDA';
                                        const iconClass = isVerified ? 'fa-check-circle' : 'fa-clock';

                                        return `
                                        <tr class="hover:bg-green-50/30 transition">
                                            <td class="px-8 py-5">
                                                <div class="font-bold text-gray-800">${m.nama}</div>
                                                <div class="text-gray-400 text-xs italic">${m.username}</div>
                                            </td>
                                            <td class="px-8 py-5 text-left">
                                                <div class="text-gray-700 font-semibold">${m.kota}</div>
                                                <div class="text-[10px] text-gray-400">${m.kecamatan}</div>
                                            </td>
                                            <td class="px-8 py-5">
                                                <span class="font-black text-[11px] tracking-tight ${textColor} flex items-center gap-1">
                                                    <i class="fas ${iconClass}"></i> ${labelText}
                                                </span>
                                            </td>
                                            <td class="px-8 py-5 text-center">
                                                <div class="flex justify-center gap-2">
                                                    ${!isVerified 
                                                        ? `<button onclick="verifikasiUser('${m.username}', this)" class="bg-green-800 hover:bg-black text-white text-[10px] font-black px-4 py-2 rounded-xl transition shadow-sm active:scale-95 flex items-center gap-2">
                                                            <i class="fas fa-check"></i> VERIFIKASI
                                                           </button>`
                                                        : `<button onclick="suspendUser('${m.username}', this)" class="bg-red-50 hover:bg-red-600 text-red-600 hover:text-white text-[10px] font-black px-4 py-2 rounded-xl transition border border-red-100 flex items-center gap-2">
                                                            <i class="fas fa-ban"></i> CABUT AKSES
                                                           </button>`
                                                    }
                                                </div>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login_sig.html";
        }

        window.onload = fetchData;
    </script>
</body>
</html>
