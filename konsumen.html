<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Katalog Konsumen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-blue-50 min-h-screen">
    <nav class="bg-blue-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <span class="font-bold text-xl"><i class="fas fa-shopping-cart mr-2"></i> Katalog Mitra</span>
            <a href="index.html" class="bg-blue-600 hover:bg-red-600 px-4 py-2 rounded-lg transition text-sm">Keluar</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-blue-900">Ketersediaan Stok Mitra</h2>
            <p class="text-gray-600">Pilih komoditas terbaik langsung dari mitra kami</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-2xl overflow-hidden shadow-lg">
                <div class="h-48 bg-gray-200 flex items-center justify-center">
                    <i class="fas fa-box-open text-4xl text-gray-400"></i>
                </div>
                <div class="p-6">
                    <h4 class="font-bold text-xl mb-2">Beras Kualitas Super</h4>
                    <p class="text-blue-600 font-bold mb-4">Rp 14.000 / Kg</p>
                    <button class="w-full bg-blue-700 text-white py-2 rounded-lg">Lihat Detail</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
